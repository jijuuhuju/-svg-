<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch用 リアルな影素材ジェネレーター</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f4f8; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; color: #333; }
    h1 { font-size: 20px; color: #855cd6; margin: 0 0 5px 0; text-align: center; }
    .subtitle { font-size: 13px; color: #666; text-align: center; margin-bottom: 15px; }
    
    .container { display: flex; flex: 1; gap: 15px; min-height: 0; }
    
    /* 左側：スライダー設定エリア */
    .toolbar { width: 230px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .tool-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; font-weight: bold; color: #555; display: flex; justify-content: space-between; }
    .val-disp { color: #855cd6; font-weight: bold; }
    select, input[type="color"], input[type="range"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    
    /* 右側：キャンバスエリア */
    .preview-area { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; position: relative; }
    .canvas-title { position: absolute; top: 10px; font-size: 12px; color: #999; font-weight: bold; }
    
    /* 実際の描画 canvas (Scratchサイズ) */
    canvas { background: #fafafa; border: 1px dashed #ccc; max-width: 100%; height: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
    
    /* ボタン */
    button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; transition: 0.2s; }
    .btn-download { background: #855cd6; color: white; margin-top: auto; box-shadow: 0 4px 0 #6c46b5; }
    .btn-download:active { transform: translateY(3px); box-shadow: 0 1px 0 #6c46b5; }
  </style>
</head>
<body>

  <h1>🧪 Scratch用 100%バグらない影ジェネレーター</h1>
  <div class="subtitle">Scratchが読み込める「背景透明のPNG画像」としてダウンロードするため、絶対にエラーが起きません。</div>

  <div class="container">
    <!-- スライダーエリア -->
    <div class="toolbar">
      <div class="tool-group">
        <label>かたち</label>
        <select id="shapeSelect">
          <option value="circle">まる (○)</option>
          <option value="rect">しかく (□)</option>
        </select>
      </div>

      <div class="tool-group">
        <label>図形の色</label>
        <input type="color" id="shapeImgColor" value="#ffab19">
      </div>

      <div class="tool-group">
        <label>影のボケ具合 (Blur) <span class="val-disp" id="blurVal">15</span></label>
        <input type="range" id="blurSlider" min="0" max="40" value="15">
      </div>

      <div class="tool-group">
        <label>影の濃さ (Opacity) <span class="val-disp" id="opacityVal">0.5</span></label>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="0.5">
      </div>

      <div class="tool-group">
        <label>横の位置 (X) <span class="val-disp" id="xVal">0</span></label>
        <input type="range" id="xSlider" min="-30" max="30" value="0">
      </div>

      <div class="tool-group">
        <label>縦の位置 (Y) <span class="val-disp" id="yVal">10</span></label>
        <input type="range" id="ySlider" min="-30" max="30" value="10">
      </div>

      <button class="btn-download" id="downloadBtn">📥 PNG画像をダウンロード</button>
    </div>

    <!-- プレビュー画面 (Scratchの標準サイズ 480x360) -->
    <div class="preview-area">
      <div class="canvas-title">影の見た目プレビュー</div>
      <canvas id="artCanvas" width="480" height="360"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d');

    const shapeSelect = document.getElementById('shapeSelect');
    const shapeImgColor = document.getElementById('shapeImgColor');
    const blurSlider = document.getElementById('blurSlider');
    const opacitySlider = document.getElementById('opacitySlider');
    const xSlider = document.getElementById('xSlider');
    const ySlider = document.getElementById('ySlider');

    // Canvasを使って、背景が透明なリアルな影付き図形を描画する
    function draw() {
      // 画面を一度きれいに消す（背景を完全に透明にする）
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const dx = parseInt(xSlider.value);
      const dy = parseInt(ySlider.value);
      const blur = parseInt(blurSlider.value);
      const opacity = parseFloat(opacitySlider.value);
      const color = shapeImgColor.value;

      document.getElementById('blurVal').innerText = blur;
      document.getElementById('opacityVal').innerText = opacity;
      document.getElementById('xVal').innerText = dx;
      document.getElementById('yVal').innerText = dy;

      // 影の設定を適用する（Canvas標準の超安定したぼかし機能）
      ctx.shadowOffsetX = dx;
      ctx.shadowOffsetY = dy;
      ctx.shadowBlur = blur;
      ctx.shadowColor = `rgba(0, 0, 0, ${opacity})`;

      // 図形を描く
      ctx.fillStyle = color;
      ctx.beginPath();

      if (shapeSelect.value === 'circle') {
        // まる
        ctx.arc(240, 180, 70, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // しかく（少し角を丸くする）
        const x = 160;
        const y = 110;
        const w = 120;
        const h = 120;
        const r = 16; // 角の丸み
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();
      }
    }

    // スライダーを動かしたら描き直す設定
    [shapeSelect, shapeImgColor, blurSlider, opacitySlider, xSlider, ySlider].forEach(el => {
      el.addEventListener('input', draw);
    });

    // 最初に1回描画しておく
    draw();

    // ★iPadでも確実に動き、Scratchで絶対にバグらないPNGダウンロード処理
    document.getElementById('downloadBtn').addEventListener('click', () => {
      // キャンバスに描かれている絵を、そのまま透明なPNGデータのURLに変換
      const pngUrl = canvas.toDataURL('image/png');
      
      const link = document.createElement('a');
      link.download = 'scratch_shadow.png'; // 拡張子を.pngにする
      link.href = pngUrl;
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>
</body>
</html>
